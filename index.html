<!DOCTYPE html>
<html>
<head>
  <title>HDB Lift - Sourcing 3D Assets</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>

  <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>

  <script>
    // =========================
    // CUSTOM HEAD-TRACKER COMPONENT
    // =========================
    AFRAME.registerComponent('head-tracker', {
      schema: {
        target: {type: 'selector', default: '[camera]'},
        boneName: {type: 'string', default: 'mixamorigHead'} // Default Mixamo head bone
      },

      init: function () {
        this.headBone = null;
        this.target3D = this.data.target.object3D;
        this.targetPos = new THREE.Vector3(); // Used to store camera's world position

        // Wait for the GLTF model to load, then find the head bone
        this.el.addEventListener('model-loaded', () => {
          const mesh = this.el.getObject3D('mesh');
          if (mesh) {
            this.headBone = mesh.getObjectByName(this.data.boneName);
            if (!this.headBone) {
              console.warn("Head bone '" + this.data.boneName + "' not found in the model!");
            }
          }
        });
      },

      tick: function () {
        if (!this.headBone || !this.target3D) return;
        
        // Get the current world position of the VR headset
        this.target3D.getWorldPosition(this.targetPos);
        
        // Force the head bone to look at the headset
        this.headBone.lookAt(this.targetPos);
      }
    });

    document.addEventListener('DOMContentLoaded', () => {

      const elevator = document.querySelector('#elevatorModel');

      // =========================
      // PLAY ANIMATION FUNCTION
      // =========================
        function playLiftAnimation(name) {
        elevator.setAttribute(
          'animation-mixer',
          {
            clip: name,
            loop: 'once',
            clampWhenFinished: true
          }
        );
      }

      // =========================      
      // WAIT FOR 3D ASSETS TO LOAD
      // =========================
      const assets = document.querySelector('a-assets');
      
      assets.addEventListener('loaded', () => {
        console.log("3D Assets fully loaded! Starting the timeline now.");

        setTimeout(() => {
          playLiftAnimation('DoorOpen');
        }, 10000);

        setTimeout(() => {
          playLiftAnimation('DoorClose');
        }, 30000);
      });

      // =========================
      // MANUAL TRIGGERS
      // =========================
      window.openLift = () => {
        playLiftAnimation('DoorOpen');
      };

      window.closeLift = () => {
        playLiftAnimation('DoorClose');
      };

    });
  </script>

</head>

<body>

<a-scene
  renderer="
    colorManagement: true;
    physicallyCorrectLights: true;
    exposure: 1.2;
    toneMapping: ACESFilmic;
  "
  background="color: #222">

  <!-- Assets -->
<a-assets timeout="120000">
  </a-assets>

  <script>
    // Check the environment
    const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    
    // Define the URLs based on the environment
    const elevatorUrl = isLocal ? 'assets/elevator.glb' : 'https://huggingface.co/datasets/MiraJ102/cgh-assets/resolve/main/elevator.glb';
    const avatarUrl = isLocal ? 'assets/Talking-On-Phone.glb' : 'https://huggingface.co/datasets/MiraJ102/cgh-assets/resolve/main/Talking-On-Phone.glb';

    // Select the a-assets tag
    const assetManager = document.querySelector('a-assets');

    // Ensure the tag was found
    if (assetManager) {
      // Dynamically create and append the Elevator asset
      const elevatorAsset = document.createElement('a-asset-item');
      elevatorAsset.setAttribute('id', 'elevator');
      elevatorAsset.setAttribute('src', elevatorUrl);
      assetManager.appendChild(elevatorAsset);

      // Create and append the Avatar asset
      const avatarAsset = document.createElement('a-asset-item');
      avatarAsset.setAttribute('id', 'avatar01');
      avatarAsset.setAttribute('src', avatarUrl);
      assetManager.appendChild(avatarAsset);
      
      console.log(isLocal ? "Running locally: Using local assets." : "Running remote: Using Hugging Face assets.");
    } else {
      console.error("Critical Error: <a-assets> tag not found. Check script placement.");
    }
  </script>

  <!-- Environment -->
  <a-entity environment="preset: forest"></a-entity>

  <!-- Elevator -->
  <a-entity
    id="elevatorModel"
    gltf-model="#elevator"
    position="0 1 0"
    rotation="0 0 0"
    scale="1 1 1"
    animation-mixer="clip: none">
  </a-entity>

  <!-- Avatar -->
  <a-entity
    gltf-model="#avatar01"
    position="0 1.065 -0.8"
    rotation="0 0 0"
    scale="0.014 0.014 0.014"
    animation-mixer>
  </a-entity>

  <!-- Lights -->

  <!-- Soft global ambient -->
  <a-light
    type="ambient"
    intensity="0.35"
    color="#dfe8ff">
  </a-light>

  <!-- Elevator ceiling light -->
  <a-light
    type="spot"
    position="1 4.8 0"
    rotation="-90 0 0"
    angle="85"
    penumbra="0.1"
    intensity="7"
    color="#fff5e6"
    distance="10"
    decay="0.1">
  </a-light>

  <!-- Soft front fill -->
  <a-light
    type="spot"
    position="0 2 -1"
    angle="45"
    penumbra="0.5"
    intensity="0.6"
    color="#ffffff"
    target="#liftTarget">
  </a-light>

  <a-entity
    id="liftTarget"
    position="0 1 0">
  </a-entity>

  <!-- Camera Rig -->
  <a-entity
    id="rig"
    movement-controls="speed: 0.1;"
    position="0 1 0">

    <a-entity
      camera
      look-controls
      wasd-controls
      position="0 2.1 0">
    </a-entity>

    <a-entity
      hand-controls="hand: left; handModelStyle: lowPoly; color: #CCCCCC">
    </a-entity>

    <a-entity
      hand-controls="hand: right; handModelStyle: lowPoly; color: #CCCCCC"
      laser-controls="hand: right">
    </a-entity>

  </a-entity>

</a-scene>

</body>
</html>
