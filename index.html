<!DOCTYPE html>
<html>
<head>
  <title>HDB Lift - Claustrophobia Scenario</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>

  <style>
    /* Styling for the loading overlay */
    #loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0, 0, 0, 0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 36px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-weight: bold;
      z-index: 1000;
    }

    /* Styling for the in-screen replay button */
    #ui-container {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999; 
      display: none; 
    }

    #replayBtn {
      background-color: #0000FF;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      transition: background-color 0.3s, transform 0.1s;
    }

    #replayBtn:hover {
      background-color: #0000CC;
    }

    #replayBtn:active {
      transform: scale(0.95);
    }
  </style>


<script>

// =========================
// BEZIER CURVE WALK COMPONENT (WITH ANIMATION SYNC)
// =========================
AFRAME.registerComponent('curve-walk', {
  schema: {
    p1: {type: 'vec3', default: {x: -3, y: 1.065, z: -5}}, 
    p2: {type: 'vec3', default: {x: -8, y: 1.065, z: -5}}, 
    dur: {type: 'number', default: 6000},
    startEvent: {type: 'string', default: 'npcWalkOut'},
    walkClip: {type: 'string', default: 'walk'}, 
    idleClip: {type: 'string', default: 'Idle'}  
  },
  init: function() {
    this.active = false;
    
    // Bind the function so we can cleanly remove it later
    this.onStart = () => {
      this.active = true;
      this.elapsed = 0;
      
      this.p0 = new THREE.Vector3().copy(this.el.object3D.position); 
      this.p1 = new THREE.Vector3(this.data.p1.x, this.data.p1.y, this.data.p1.z);
      this.p2 = new THREE.Vector3(this.data.p2.x, this.data.p2.y, this.data.p2.z);

      this.el.setAttribute('animation-mixer', `clip: ${this.data.walkClip}; loop: repeat; timeScale: 0.8; crossFadeDuration: 0.2`);
    };

    this.el.addEventListener(this.data.startEvent, this.onStart);
  },
  remove: function() {
    // Cleans up the listener so it doesn't duplicate on replay
    this.el.removeEventListener(this.data.startEvent, this.onStart);
  },
  tick: function(time, timeDelta) {
    if (!this.active || window.isSimulationFrozen) return;

    this.elapsed += timeDelta;
    let t = this.elapsed / this.data.dur;

    if (t >= 1) {
      t = 1;
      this.active = false; 
      this.el.setAttribute('animation-mixer', `clip: ${this.data.idleClip}; loop: repeat; crossFadeDuration: 0.2`);
    }

    let omt = 1 - t;
    
    let x = omt*omt*this.p0.x + 2*omt*t*this.p1.x + t*t*this.p2.x;
    let y = omt*omt*this.p0.y + 2*omt*t*this.p1.y + t*t*this.p2.y; 
    let z = omt*omt*this.p0.z + 2*omt*t*this.p1.z + t*t*this.p2.z;

    this.el.object3D.position.set(x, y, z);

    let dx = 2*omt*(this.p1.x - this.p0.x) + 2*t*(this.p2.x - this.p1.x);
    let dz = 2*omt*(this.p1.z - this.p0.z) + 2*t*(this.p2.z - this.p1.z);
    
    this.el.object3D.rotation.y = Math.atan2(dx, dz);
  }
});
  

// =========================
// HMD TO BODY SYNC COMPONENT (LAZY FOLLOW)
// =========================
AFRAME.registerComponent('body-sync', {
  schema: {
    camera: { type: 'selector', default: '[camera]' },
    threshold: { type: 'number', default: 45 } // The angle limit in degrees
  },
  tick: function () {
    if (!this.data.camera) return;

    const camera3D = this.data.camera.object3D;
    const body3D = this.el.object3D;

    // 1. Sync Position (X and Z)
    body3D.position.x = camera3D.position.x;
    body3D.position.z = camera3D.position.z;

    // 2. Sync Rotation (Y-axis only) with Deadzone
    // Convert the 45-degree threshold into radians for Three.js
    const thresholdRad = this.data.threshold * (Math.PI / 180);

    const camRotY = camera3D.rotation.y;
    let bodyRotY = body3D.rotation.y;

    // Calculate the difference between where the head is looking and the body is facing
    let diff = camRotY - bodyRotY;

    // Normalize the angle to handle full 360-degree spins cleanly
    while (diff <= -Math.PI) diff += Math.PI * 2;
    while (diff > Math.PI) diff -= Math.PI * 2;

    // If the head turns further than the threshold, drag the body with it
    if (diff > thresholdRad) {
      body3D.rotation.y = camRotY - thresholdRad;
    } else if (diff < -thresholdRad) {
      body3D.rotation.y = camRotY + thresholdRad;
    }
  }
});

// =========================
// CUSTOM SCROLLER COMPONENT
// =========================
AFRAME.registerComponent('texture-scroller', {
  schema: {
    speed: { type: 'number', default: 0.5 },
    direction: { type: 'string', default: 'down' },
    active: { type: 'boolean', default: false } 
  },
  tick: function (time, timeDelta) {
    if (!this.data.active) return; 
    
    // Failsafe: Ensures the entity's mesh is fully loaded before scrolling
    const mesh = this.el.getObject3D('mesh');
    if (!mesh || !mesh.material || !mesh.material.map) return;
    
    const texture = mesh.material.map;
    const offsetChange = (this.data.speed * timeDelta) / 1000;
    
    if (this.data.direction === 'up') {
      texture.offset.y -= offsetChange;
    } else {
      texture.offset.y += offsetChange;
    }
  }
});

  // =========================
  // VR CONTROLLER INPUT
  // =========================
  AFRAME.registerComponent('sequence-controller', {
    init: function () {
      // Right Controller: 'A' Button to Start
      this.el.addEventListener('abuttondown', () => {
        window.dispatchEvent(new Event('vr-start-sequence'));
      });

      // Left Controller: 'X' Button to Freeze/Unfreeze
      this.el.addEventListener('xbuttondown', () => {
        window.dispatchEvent(new Event('vr-freeze-sequence'));
      });
    }
  });

  document.addEventListener('DOMContentLoaded', () => {
    const elevator = document.querySelector('#elevatorModel');
    const avatar = document.querySelector('#avatarModelSophie'); 
    const replayBtnContainer = document.querySelector('#ui-container');
    const replayBtn = document.querySelector('#replayBtn');
    const loadingOverlay = document.querySelector('#loading-overlay');
    
    // Lift State Variables
    let currFloor = 4;
    let isMoving = false;
    let isDoorsOpen = false;

    // =========================
    // VR BUTTON LISTENERS
    // =========================
    window.addEventListener('vr-start-sequence', () => {
      if (isDoorsOpen) {
        playLiftAnimation('DoorClose');
        isDoorsOpen = false;
      }
      if (!isMoving && !window.isSimulationFrozen) {
        playSequence();
      }
    });

    window.addEventListener('vr-freeze-sequence', () => {
      window.isSimulationFrozen = !window.isSimulationFrozen; // Toggle state

      const rig = document.querySelector('#rig');
      const npc1 = document.querySelector('#avatarModelSophie');
      const scrollingShaft = document.querySelector('#scrolling-shaft');

      if (window.isSimulationFrozen) {
        console.log("SIMULATION FROZEN");
        // Pause entity animations, scripts, and sounds
        npc1.pause(); 
        rig.pause(); 
        scrollingShaft.pause(); 
        if (elevator.components.sound) elevator.components.sound.pauseSound();
      } else {
        console.log("SIMULATION RESUMED");
        // Resume entity animations, scripts, and sounds
        npc1.play(); 
        rig.play(); 
        scrollingShaft.play();
        if (isMoving && elevator.components.sound) elevator.components.sound.playSound();
      }
    });

    // =========================
    // PLAY ANIMATION FUNCTIONS
    // =========================
    function playLiftAnimation(name) {
      elevator.setAttribute('animation-mixer', {
        clip: name,
        loop: 'once',
        clampWhenFinished: true,
      });

      // Tie mechanical sounds directly to the animation triggers
      if (name === 'DoorOpen') {
        if (elevator.components.sound__dooropen) {
            elevator.components.sound__dooropen.playSound();
        }
      } else if (name === 'DoorClose') {
        if (elevator.components.sound__doorclose) {
            elevator.components.sound__doorclose.playSound();
        }
      }
    }

    function playAvatarAnimation(name) {
      if (avatar) {
        avatar.setAttribute('animation-mixer', {
          clip: name,
          loop: 'repeat',
        });
      }
    }

    // =========================      
    // WAIT FOR 3D ASSETS TO LOAD
    // =========================
    const assets = document.querySelector('a-assets');

    // Global state for freezing
    window.isSimulationFrozen = false;

    // Freeze-aware sleep function
    const sleep = async (ms) => {
      let elapsed = 0;
      const step = 50; // Check every 50ms
      while (elapsed < ms) {
        await new Promise(r => setTimeout(r, step));
        // Only progress the timer if we are NOT frozen
        if (!window.isSimulationFrozen) {
          elapsed += step;
        }
      }
    };
    
    // =========================
    // THE SCENARIO SEQUENCE
    // =========================
    async function playSequence() {
      // Hide button during sequence
      replayBtnContainer.style.display = 'none';

      const rig = document.querySelector('#rig');
      const npc1 = document.querySelector('#avatarModelSophie');
      const mainChar = document.querySelector('#mainCharacterEntity');

      // Reset Camera Rig 
      rig.removeAttribute('movement-controls'); 
      rig.setAttribute('position', '-4.5 1.8 0');
      rig.setAttribute('rotation', '0 -90 0');

      // Reset the internal camera rotation (User's Head)
      const cameraEl = rig.querySelector('[camera]');
      if (cameraEl && cameraEl.components['look-controls']) {
        cameraEl.components['look-controls'].pitchObject.rotation.x = 0;
        cameraEl.components['look-controls'].yawObject.rotation.y = 0;
      }

      // Instantly snap the body rotation back to 0 so it doesn't drag
      const bodyWrapper = document.querySelector('#bodyWrapper');
      if (bodyWrapper) {
        bodyWrapper.object3D.rotation.y = 0;
      }
      
      // Reset NPC position and animation
      npc1.removeAttribute('curve-walk'); // We ONLY remove the custom component
      npc1.setAttribute('position', '-3 1.065 -0.2');
      npc1.setAttribute('rotation', '0 90 0');
      npc1.setAttribute('animation-mixer', 'clip: Idle; loop: repeat');

      // Reset Main Character 
      mainChar.setAttribute('animation-mixer', 'clip: Idle; loop: repeat; crossFadeDuration: 0.2');

      // Camera animations for sequence
      rig.setAttribute('animation__panIn', 'property: position; to: 0.3 1.8 0; startEvents: panCameraIn; dur: 7000; easing: easeInOutQuad');
      rig.setAttribute('animation__panOut', 'property: position; to: -4.5 1.8 0; startEvents: panCameraOut; dur: 7000; easing: easeInOutQuad');
      rig.setAttribute('animation__turn', 'property: rotation; to: 0 90 0; startEvents: turnCameraAround; dur: 4000; easing: easeInOutQuad');

      // Re-register NPC position/rotation animations 
      npc1.setAttribute('animation__walkin', 'property: position; to: -0.3 1.065 -0.6; startEvents: npcWalkIn; dur: 3500; easing: linear');
      npc1.setAttribute('animation__turn', 'property: rotation; to: 0 -90 0; startEvents: npcTurn; dur: 2000; easing: easeInOutQuad');

      console.log("Moving to Floor 1...");
      await window.goToFloor(1, true); 
      await sleep(2000); 
        
      console.log("NPC Walk-in...");
      npc1.setAttribute('animation-mixer', 'clip: walk; loop: repeat; timeScale: 0.8');
      npc1.emit('npcWalkIn');
      await sleep(1500);

      console.log("Panning camera in...");
      mainChar.setAttribute('animation-mixer', 'clip: walk; loop: repeat; timeScale: 0.8');
      rig.emit('panCameraIn');
      await sleep(1000);
      
      console.log("NPC Turning...");

      npc1.emit('npcTurn');
      npc1.setAttribute('animation-mixer', 'clip: turn; loop: once'); 
      npc1.setAttribute('animation-mixer', 'clip: Idle; loop: repeat'); 
      await sleep(3000);


      console.log("Turning camera...");
      mainChar.setAttribute('animation-mixer', 'clip: Idle; loop: repeat'); 
      rig.emit('turnCameraAround');
      await sleep(2500); 

        
      console.log("Moving to Floor 8...");
      await window.goToFloor(8);
      await sleep(3000);

      console.log("NPC Walk-out...");
      npc1.setAttribute('curve-walk', 'p1: -4 1.065 1; p2: -8 1.065 -6; dur: 6000; startEvent: npcWalkOut');
      npc1.emit('npcWalkOut');
      mainChar.setAttribute('animation-mixer', 'clip: Idle; loop: repeat');

      console.log("Moving to Floor 15...");
      await window.goToFloor(15);
      await sleep(2000);

      console.log("Panning camera out...");
      mainChar.setAttribute('animation-mixer', 'clip: walk; loop: repeat');
      rig.emit('panCameraOut');
      await sleep(2000);
      mainChar.setAttribute('animation-mixer', 'clip: Idle; loop: repeat');

      console.log("Sequence Complete.");

      rig.setAttribute('movement-controls', 'speed: 0.1'); 

      // Show the replay button once finished
      replayBtnContainer.style.display = 'block';
    }

    assets.addEventListener('loaded', async () => {
      console.log("3D Assets fully loaded!");
      
      // Initialize the screen display to Floor 4, Idle
      updateAllDisplays(currFloor, 'idle');

      document.querySelector('#scrolling-shaft').setAttribute('visible', 'false');
      document.querySelector('#first-floor').setAttribute('visible', 'true');
      document.querySelector('#upper-floor').setAttribute('visible', 'false');
      document.querySelector('#middle-floor').setAttribute('visible', 'false');
      document.querySelector('#lower-floor').setAttribute('visible', 'false');

      if (currFloor === 1) {
        document.querySelector('#first-floor').setAttribute('visible', 'true');
      } else if (currFloor > 1 && currFloor <= 6) {
        document.querySelector('#lower-floor').setAttribute('visible', 'true');
      } else if (currFloor > 6 && currFloor <= 10) {
        document.querySelector('#middle-floor').setAttribute('visible', 'true');
      } else if (currFloor > 10 && currFloor <= 15) {
        document.querySelector('#upper-floor').setAttribute('visible', 'true');
      }
      
      // Hide the loading overlay and reveal the START button
      loadingOverlay.style.display = 'none';
      replayBtnContainer.style.display = 'block';
    });

    // Bind START button
    replayBtn.addEventListener('click', () => {
      // Visually close the doors and update state before starting the sequence
      if (isDoorsOpen) {
        playLiftAnimation('DoorClose');
        isDoorsOpen = false;
      }
      playSequence();
    });



    // =========================
    // Screen Display Update
    // =========================
    function updateAllDisplays(floorNumber, direction) {
      const floors = document.querySelectorAll('.lift-floor');
      const arrows = document.querySelectorAll('.lift-arrow');

      floors.forEach(floor => {
        floor.setAttribute('value', floorNumber);
      });

      arrows.forEach(arrow => {
        if (direction === 'up') {
          arrow.setAttribute('visible', 'true');
          arrow.setAttribute('rotation', '0 0 0');
        } else if (direction === 'down') {
          arrow.setAttribute('visible', 'true');
          arrow.setAttribute('rotation', '0 0 180');
        } else {
          arrow.setAttribute('visible', 'false'); // Idle state
        }
      });
    }

    // =========================
    // LIFT MOVEMENT LOGIC
    // =========================
    window.goToFloor = async function(destFloor, isSilentMove = false) {
      if (isMoving || currFloor === destFloor) return;
      isMoving = true;

      const isGoingUp = destFloor > currFloor;
      const screenDir = isGoingUp ? 'up' : 'down';
      const scrollDir = isGoingUp ? 'down' : 'up'; 

      // =========================
      // VOLUME ADJUSTMENT
      // =========================
      const targetVolume = isSilentMove ? 1 : 2.0;
      
      // 1. Notice 'sound' is REMOVED from this array so the instant update doesn't fight the fade
      const allElevatorSounds = [
          'sound__voiceup', 'sound__voicedown', 
          'sound__voicedoorclose', 'sound__doorclose', 'sound__dooropen', 'sound__ding'
      ];
      
      allElevatorSounds.forEach(soundName => {
          if (elevator.components[soundName]) {
              elevator.setAttribute(soundName, 'volume', targetVolume);
          }
      });

      // 2. Dynamically tell the animations what the max volume should be for this specific trip
      elevator.setAttribute('animation__fadein', { to: targetVolume });
      elevator.setAttribute('animation__fadeout', { from: targetVolume });

      // =========================
      // PHASE 1: DEPARTURE SEQUENCE
      // =========================
      if (isDoorsOpen) {

        // 1. Play "Going Up/Down" voice
        if (isGoingUp && elevator.components.sound__voiceup) {
           elevator.components.sound__voiceup.playSound();
        } else if (!isGoingUp && elevator.components.sound__voicedown) {
           elevator.components.sound__voicedown.playSound();
        }
        await sleep(1500); 

        // 2. Play "Doors Closing" voice
        if (elevator.components.sound__voicedoorclose) {
            elevator.components.sound__voicedoorclose.playSound();
        }
        await sleep(2000); 

        // 3. Close doors
        playLiftAnimation('DoorClose');
        isDoorsOpen = false;
        await sleep(2000); 
      }

      // =========================
      // PHASE 2: TRANSIT SEQUENCE
      // =========================
      updateAllDisplays(currFloor, screenDir);

      const firstFloorPlane = document.querySelector('#first-floor');
      const lowerFloorPlane = document.querySelector('#lower-floor');
      const middleFloorPlane = document.querySelector('#middle-floor');
      const upperFloorPlane = document.querySelector('#upper-floor');
      const scrollingShaft = document.querySelector('#scrolling-shaft');

      // Visuals split based on silent move
      if (!isSilentMove) {
        firstFloorPlane.setAttribute('visible', 'false');
        lowerFloorPlane.setAttribute('visible', 'false');
        middleFloorPlane.setAttribute('visible', 'false');
        upperFloorPlane.setAttribute('visible', 'false');
        
        scrollingShaft.setAttribute('visible', 'true');
        scrollingShaft.setAttribute('texture-scroller', `active: true; direction: ${scrollDir}`);
      } else {
        firstFloorPlane.setAttribute('visible', 'true');
        scrollingShaft.setAttribute('visible', 'false');
      }

      // START MOVING SOUND (Plays for both standard and silent moves)
      if (elevator.components.sound) {
          elevator.setAttribute('sound', 'volumn', 0);
          elevator.components.sound.playSound();
          elevator.emit('fade-in');
      }

      // =========================
      // PHASE 3: FLOOR COUNTING
      // =========================
      await new Promise((resolve) => {
        const floorInterval = setInterval(() => {
          if (window.isSimulationFrozen) return;

    
          currFloor += isGoingUp ? 1 : -1;
          updateAllDisplays(currFloor, screenDir);

          if (currFloor === destFloor) {
            clearInterval(floorInterval);
            resolve();
          }
        }, 2800); 
      });

      // =========================
      // PHASE 4: ARRIVAL SEQUENCE
      // =========================
      // Stop Visuals
      if (!isSilentMove) {
        scrollingShaft.setAttribute('texture-scroller', 'active: false');
        scrollingShaft.setAttribute('visible', 'false');

        if (currFloor === 1) firstFloorPlane.setAttribute('visible', 'true');
        else if (currFloor <= 6) lowerFloorPlane.setAttribute('visible', 'true');
        else if (currFloor <= 10) middleFloorPlane.setAttribute('visible', 'true');
        else upperFloorPlane.setAttribute('visible', 'true');
      }

      // STOP MOVING SOUND (Stops for both standard and silent moves now)
      if (elevator.components.sound) {
          // 1. Trigger the fade-out animation
          elevator.emit('fade-out');
          
          // 2. Wait 2000ms (the duration of your fade-out) before fully stopping the track
          setTimeout(() => {
            if (elevator.components.sound) {
              elevator.components.sound.stopSound();
            }
          }, 2000);
      }

      updateAllDisplays(currFloor, 'idle');
      await sleep(1000); 

      // 1. Ding sound first
      if (elevator.components.sound__ding) {
          elevator.components.sound__ding.playSound();
      }
      await sleep(800); 

      // 2. Open doors 
      playLiftAnimation('DoorOpen');
      isDoorsOpen = true;
      isMoving = false; 
    };

    window.openLift = () => playLiftAnimation('DoorOpen');
    window.closeLift = () => playLiftAnimation('DoorClose');
  });
</script>

</head>

<body>

<div id="loading-overlay">LOADING...</div>

<div id="ui-container">
  <button id="replayBtn">START</button>
</div>

<a-scene
  renderer="
    colorManagement: true;
    physicallyCorrectLights: true;
    exposure: 1.2;
    toneMapping: ACESFilmic;
  "
  background="color: #222">

  <a-assets timeout="120000"></a-assets>

  <script>
    const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    const elevatorUrl = isLocal ? 'assets/elevator.glb' : 'https://huggingface.co/datasets/MiraJ102/cgh-assets/resolve/main/elevator.glb';
    const mainCharacterUrl = isLocal ? 'assets/main_char.glb' : 'https://huggingface.co/datasets/MiraJ102/cgh-assets/resolve/main/main_char.glb';
    const avatarUrl = isLocal ? 'assets/NPCs/NPC_Sophie.glb' : 'https://huggingface.co/datasets/MiraJ102/cgh-assets/resolve/main/NPC_Sophie.glb';
    const assetManager = document.querySelector('a-assets');

    if (assetManager) {
      const elevatorAsset = document.createElement('a-asset-item');
      elevatorAsset.setAttribute('id', 'elevator');
      elevatorAsset.setAttribute('src', elevatorUrl);
      assetManager.appendChild(elevatorAsset);

      const avatarAsset = document.createElement('a-asset-item');
      avatarAsset.setAttribute('id', 'avatar01');
      avatarAsset.setAttribute('src', avatarUrl);
      assetManager.appendChild(avatarAsset);

      const mainCharacterAsset = document.createElement('a-asset-item');
      mainCharacterAsset.setAttribute('id', 'mainCharacter');
      mainCharacterAsset.setAttribute('src', mainCharacterUrl);
      assetManager.appendChild(mainCharacterAsset);

      console.log(isLocal ? "Running locally: Using local assets." : "Running remote: Using Hugging Face assets.");
    } else {
      console.error("Critical Error: <a-assets> tag not found. Check script placement.");
    }
  </script>

  <a-entity environment="preset: forest"></a-entity>

  <a-entity
    id="elevatorModel"
    gltf-model="#elevator"
    position="0 1 0"
    rotation="0 0 0"
    scale="1 1 1"
    animation-mixer="clip: none"

    sound="src: #lift-move-sound; poolSize: 2; volume: 4; loop: true"
    animation__fadein="property: sound.volume; from: 0; to: 4; dur: 2000; easing: linear; startEvents: fade-in"
    animation__fadeout="property: sound.volume; from: 4; to: 0; dur: 2000; easing: linear; startEvents: fade-out"

    sound__dooropen="src: #lift-door-open; poolSize: 2; volume: 4"
    sound__doorclose="src: #lift-door-close; poolSize: 2; volume: 4"
    sound__ding="src: #lift-ding; poolSize: 2; volume: 1"
    sound__voiceup="src: #voice-going-up; poolSize: 2; volume: 1"
    sound__voicedown="src: #voice-going-down; poolSize: 2; volume: 1"
    sound__voicedoorclose="src: #voice-door-close; poolSize: 2; volume: 1">
    
  </a-entity>

  <a-box id="outside-screen-display" position="-2.042 4.124 0" width="0.631" height="0.231" depth="0.0483" color="#111111" rotation="0 -90 0">
    <a-triangle class="lift-arrow" 
              vertex-a="0 0.08 0" vertex-b="-0.08 -0.08 0" vertex-c="0.08 -0.08 0"
              color="#FF0000" 
              position="-0.15 0 0.0244"
