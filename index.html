<!DOCTYPE html>
<html>
<head>
  <title>HDB Lift - Sourcing 3D Assets</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>

<script>
  // =========================
  // CUSTOM SCROLLER COMPONENT
  // =========================
  AFRAME.registerComponent('texture-scroller', {
    schema: {
      speed: { type: 'number', default: 0.5 },
      direction: { type: 'string', default: 'down' },
      active: { type: 'boolean', default: false } // Added toggle to stop/start
    },
    tick: function (time, timeDelta) {
      if (!this.data.active) return; // Only scroll when moving
      
      const mesh = this.el.getObject3D('mesh');
      if (!mesh || !mesh.material || !mesh.material.map) return;
      
      const texture = mesh.material.map;
      const offsetChange = (this.data.speed * timeDelta) / 1000;
      
      if (this.data.direction === 'up') {
        texture.offset.y -= offsetChange;
      } else {
        texture.offset.y += offsetChange;
      }
    }
  });

  document.addEventListener('DOMContentLoaded', () => {
    const elevator = document.querySelector('#elevatorModel');
    const avatar = document.querySelector('#avatarModel'); 
    
    // Lift State Variables
    let currFloor = 4;
    let isMoving = false;
    let isDoorsOpen = false;

    // =========================
    // PLAY ANIMATION FUNCTIONS
    // =========================
    function playLiftAnimation(name) {
      elevator.setAttribute('animation-mixer', {
        clip: name,
        loop: 'once',
        clampWhenFinished: true
      });
    }

    function playAvatarAnimation(name) {
      if (avatar) {
        avatar.setAttribute('animation-mixer', {
          clip: name,
          loop: 'repeat'
        });
      }
    }

    // =========================      
    // WAIT FOR 3D ASSETS TO LOAD
    // =========================
    const assets = document.querySelector('a-assets');
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
    
    assets.addEventListener('loaded', async () => {
      console.log("3D Assets fully loaded!");
      setTimeout(() => playAvatarAnimation('mixamo.com'), 2000);
      
      // Initialize the screen display to Floor 4, Idle
      updateAllDisplays(currFloor, 'idle');

      document.querySelector('#scrolling-shaft').setAttribute('visible', 'false');
      document.querySelector('#first-floor').setAttribute('visible', 'true');
      document.querySelector('#upper-floor').setAttribute('visible', 'false');
      // =========================
      // THE AUTOMATIC SCENARIO
      // =========================
      await sleep(5000); // Brief pause after loading before starting
        
      console.log("Moving to Floor 1...");
      await window.goToFloor(1); 

      await sleep(5000); // Pause at Floor 1

      const rig = document.querySelector('#rig');
        
      console.log("Panning camera in...");
      rig.emit('panCameraIn');
      await sleep(4000); 
        
      console.log("Turning camera...");
      rig.emit('turnCameraAround');
      await sleep(5000); 
        
      console.log("Moving to Floor 8...");
      await window.goToFloor(8);
      console.log("Sequence Complete.");
    });
    // =========================
    // Screen Display Update
    // =========================
    function updateAllDisplays(floorNumber, direction) {
      const floors = document.querySelectorAll('.lift-floor');
      const arrows = document.querySelectorAll('.lift-arrow');

      floors.forEach(floor => {
        floor.setAttribute('value', floorNumber);
      });

      arrows.forEach(arrow => {
        if (direction === 'up') {
          arrow.setAttribute('visible', 'true');
          arrow.setAttribute('rotation', '0 0 0');
        } else if (direction === 'down') {
          arrow.setAttribute('visible', 'true');
          arrow.setAttribute('rotation', '0 0 180');
        } else {
          arrow.setAttribute('visible', 'false'); // Idle state
        }
      });
    }

    // =========================
    // LIFT MOVEMENT LOGIC
    // =========================
    window.goToFloor = function(destFloor) {
      return new Promise((resolve) => {
      // Prevent running if already moving or already at the requested floor
      if (isMoving || currFloor === destFloor) return;
      isMoving = true;

      const firstFloorPlane = document.querySelector('#first-floor');
      const upperFloorPlane = document.querySelector('#upper-floor');
      const scrollingShaft = document.querySelector('#scrolling-shaft');

      // 1. Close the doors if they are open
      if (isDoorsOpen) {
        playLiftAnimation('DoorClose');
        isDoorsOpen = false;
      }

      // 2. Wait 3 seconds for doors to close, then start moving
      setTimeout(() => {
        const isGoingUp = destFloor > currFloor;
        const screenDir = isGoingUp ? 'up' : 'down';
        
        // If moving UP, background pans DOWN (and vice versa)
        const scrollDir = isGoingUp ? 'down' : 'up'; 

        // Update the LED arrows
        updateAllDisplays(currFloor, screenDir);

        // Hide the static 1st floor, show and start the scrolling shaft
        firstFloorPlane.setAttribute('visible', 'false');
        upperFloorPlane.setAttribute('visible', 'false');
        
        scrollingShaft.setAttribute('visible', 'true');
        scrollingShaft.setAttribute('texture-scroller', `active: true; direction: ${scrollDir}`);

        // 3. The 1-second counting interval
        const floorInterval = setInterval(async () => {
          // Increment or decrement the current floor
          if (isGoingUp) {
            currFloor++;
          } else {
            currFloor--;
          }

          // Update screens with the new number
          updateAllDisplays(currFloor, screenDir);

          // 4. Check if we arrived at the destination
          if (currFloor === destFloor) {
            clearInterval(floorInterval); // Stop counting

            // Update screens to idle
            updateAllDisplays(currFloor, 'idle');
            
            // Stop the scrolling animation
            scrollingShaft.setAttribute('texture-scroller', 'active: false');
            scrollingShaft.setAttribute('visible', 'false');

            // Handle the outside scenery based on arrival floor
            if (currFloor === 1) {
              firstFloorPlane.setAttribute('visible', 'true');
            } else {
              upperFloorPlane.setAttribute('visible', 'true');
            }

            await sleep(1500); // Brief pause before opening doors

            playLiftAnimation('DoorOpen');
            isDoorsOpen = true;
            isMoving = false; 
            resolve();
          }
        }, 1500); 

      }, 3000); 
    });
    };

    // MANUAL TRIGGERS
    window.openLift = () => playLiftAnimation('DoorOpen');
    window.closeLift = () => playLiftAnimation('DoorClose');
  });
</script>

</head>

<body>

<a-scene
  renderer="
    colorManagement: true;
    physicallyCorrectLights: true;
    exposure: 1.2;
    toneMapping: ACESFilmic;
  "
  background="color: #222">

  <a-assets timeout="120000"></a-assets>

  <script>
    // Check the environment
    const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    
    // Define the URLs based on the environment
    const elevatorUrl = isLocal ? 'assets/elevator.glb' : 'https://huggingface.co/datasets/MiraJ102/cgh-assets/resolve/main/elevator.glb';
    const avatarUrl = isLocal ? 'assets/Talking-On-Phone.glb' : 'https://huggingface.co/datasets/MiraJ102/cgh-assets/resolve/main/Talking-On-Phone.glb';

    // Select the a-assets tag
    const assetManager = document.querySelector('a-assets');

    // Ensure the tag was found
    if (assetManager) {
      // Dynamically create and append the Elevator asset
      const elevatorAsset = document.createElement('a-asset-item');
      elevatorAsset.setAttribute('id', 'elevator');
      elevatorAsset.setAttribute('src', elevatorUrl);
      assetManager.appendChild(elevatorAsset);

      // Create and append the Avatar asset
      const avatarAsset = document.createElement('a-asset-item');
      avatarAsset.setAttribute('id', 'avatar01');
      avatarAsset.setAttribute('src', avatarUrl);
      assetManager.appendChild(avatarAsset);
      
      console.log(isLocal ? "Running locally: Using local assets." : "Running remote: Using Hugging Face assets.");
    } else {
      console.error("Critical Error: <a-assets> tag not found. Check script placement.");
    }
  </script>

  <a-entity environment="preset: forest"></a-entity>

  <a-entity
    id="elevatorModel"
    gltf-model="#elevator"
    position="0 1 0"
    rotation="0 0 0"
    scale="1 1 1"
    animation-mixer="clip: none">
  </a-entity>

  <a-box id="outside-screen-display" position="-2.042 4.124 0" width="0.631" height="0.231" depth="0.0483" color="#111111" rotation="0 -90 0">
    <a-triangle class="lift-arrow" 
              vertex-a="0 0.08 0" vertex-b="-0.08 -0.08 0" vertex-c="0.08 -0.08 0"
              color="#FF0000" 
              position="-0.15 0 0.0244" 
              rotation="0 0 0"
              visible="true"> </a-triangle>

    <a-text class="lift-floor" 
              value="1" 
              color="#FF0000" 
              align="center" 
              position="0.12 0 0.02415" 
              font="https://cdn.aframe.io/fonts/Roboto-msdf.json">
    </a-text>
  </a-box>

  <a-box id="inside-screen-display" position="-1.482 4.124 0" width="0.631" height="0.231" depth="0.0483" color="#111111" rotation="0 90 0">
    <a-triangle class="lift-arrow" 
              vertex-a="0 0.08 0" vertex-b="-0.08 -0.08 0" vertex-c="0.08 -0.08 0"
              color="#FF0000" 
              position="-0.15 0 0.0244" 
              rotation="0 0 0"
              visible="true"> </a-triangle>

    <a-text class="lift-floor" 
              value="1" 
              color="#FF0000" 
              align="center" 
              position="0.12 0 0.02415" 
              font="https://cdn.aframe.io/fonts/Roboto-msdf.json">
    </a-text>
  </a-box>


  <a-assets>
    <img id="tex-loop" src="assets/floor-scroll.jpg">
    <img id="tex-first" src="assets/floor-1.jpg">
    <img id="tex-upper" src="assets/floor-upper.jpg"> 
  </a-assets>

  <a-plane 
    id="scrolling-shaft"
    position="-5 0 0" 
    rotation="0 90 0"
    width="12" height="35" 
    material="src: #tex-loop; repeat: 1 4;" 
    texture-scroller="speed: 0.8; direction: down"
    visible="true">
  </a-plane>

  <a-plane 
    id="first-floor"
    position="-5 3 0"
    rotation="0 90 0" 
    width="12" height="7" 
    material="src: #tex-first;" 
    visible="false">
  </a-plane>

    <a-plane 
    id="upper-floor"
    position="-5 3 0"
    rotation="0 90 0" 
    width="12" height="7" 
    material="src: #tex-upper;" 
    visible="false">
  </a-plane>

  <a-entity
    id="avatarModel"
    gltf-model="#avatar01"
    position="0 1.065 -0.8"
    rotation="0 0 0"
    scale="0.014 0.014 0.014"
    animation-mixer>
  </a-entity>

  <a-light
    type="ambient"
    intensity="0.35"
    color="#dfe8ff">
  </a-light>

  <a-light
    type="spot"
    position="1 4.8 0"
    rotation="-90 0 0"
    angle="85"
    penumbra="0.1"
    intensity="7"
    color="#fff5e6"
    distance="10"
    decay="0.1">
  </a-light>

  <a-light
    type="spot"
    position="0 2 -1"
    angle="45"
    penumbra="0.5"
    intensity="0.6"
    color="#ffffff"
    target="#liftTarget">
  </a-light>

  <a-entity
    id="liftTarget"
    position="0 1 0">
  </a-entity>

  <a-entity
    id="rig"
    movement-controls="speed: 0.1;"
    position="-4.5 2 0"
    rotation="0 -90 0"
    animation__pan="property: position; to: 0.3 2 0; startEvents: panCameraIn; dur: 4500; easing: easeInOutQuad"
    animation__turn="property: rotation; to: 0 90 0; startEvents: turnCameraAround; dur: 3000; easing: easeInOutQuad">

    <a-entity
      camera
      look-controls
      wasd-controls
      position="0 1.3 0">
    </a-entity>

    <a-entity
      hand-controls="hand: left; handModelStyle: lowPoly; color: #CCCCCC">
    </a-entity>

    <a-entity
      hand-controls="hand: right; handModelStyle: lowPoly; color: #CCCCCC"
      laser-controls="hand: right">
    </a-entity>

  </a-entity>

</a-scene>

</body>
</html>
