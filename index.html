<!DOCTYPE html>
<html>
<head>
  <title>HDB Lift - Claustrophobia Scenario</title>

  <!-- A-Frame core + plugins (must come first) -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
  <script src="js/components.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/sequenceBase.js"></script>
  <script src="js/sequence01.js"></script>
  <script src="js/sequence02.js"></script>
  <script src="js/sequence03.js"></script>

  <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
  <link rel="manifest" href="favicon_io/site.webmanifest">

  <style>
    #loading-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background-color: rgba(0, 0, 0, 0.6);
      display: flex;
      justify-content: center; align-items: center;
      color: white; font-size: 36px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-weight: bold; z-index: 1000;
    }

    #ui-container {
      position: absolute;
      bottom: 30px; left: 50%;
      transform: translateX(-50%);
      z-index: 999; display: none;
    }

    #replayBtn {
      background-color: #0000FF; color: white;
      border: none; padding: 15px 30px;
      font-size: 18px; font-weight: bold;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      border-radius: 8px; cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      transition: background-color 0.3s, transform 0.1s;
    }

    #replayBtn:hover  { background-color: #0000CC; }
    #replayBtn:active { transform: scale(0.95); }
  </style>
</head>
<body>

<div id="loading-overlay">LOADING...</div>
<div id="ui-container"><button id="replayBtn">START</button></div>

<a-scene
  webxr="referenceSpaceType: local"
  renderer="colorManagement: true; physicallyCorrectLights: true; exposure: 1.2; toneMapping: ACESFilmic;"
  background="color: #222">

  <a-assets timeout="120000">
  <img id="tex-loop"   src="assets/floor-scroll.jpg">
  <img id="tex-first"  src="assets/floor-1.jpg">
  <img id="tex-lower"  src="assets/floor-lower.jpg">
  <img id="tex-middle" src="assets/floor-middle.jpg">
  <img id="tex-upper"  src="assets/floor-upper.jpg">

  <!-- Lift sound effects -->
    <audio id="lift-move-sound"  src="assets/sounds/LiftMoving.mp3"></audio>
    <audio id="lift-door-open"   src="assets/sounds/DoorOpen.mp3"></audio>
    <audio id="lift-door-close"  src="assets/sounds/DoorClose.mp3"></audio>
    <audio id="lift-ding"        src="assets/sounds/Ding.mp3"></audio>
    <audio id="voice-going-up"   src="assets/sounds/Voice_GoingUp.mp3"></audio>
    <audio id="voice-going-down" src="assets/sounds/Voice_GoingDown.mp3"></audio>
    <audio id="voice-door-close" src="assets/sounds/Voice_DoorsClosing.mp3"></audio>

    <!-- Lift interior texture -->
    <img id="safety-poster-tex"  src="assets/poster.jpg">
  </a-assets>

  <!--
    GLB asset items are injected here BEFORE any entity that references them.
    An inline script is used so the items exist in <a-assets> synchronously —
    at the moment the entities below are initialised by A-Frame — regardless of
    whether we are on localhost or the Netlify deployment.
  -->
  <script>
    (function () {
      const isLocal = ['localhost', '127.0.0.1'].includes(window.location.hostname);
      const base    = isLocal
        ? 'assets/'
        : 'https://huggingface.co/datasets/MiraJ102/cgh-assets/resolve/main/';

      const assets = document.querySelector('a-assets');
      [
        { id: 'elevator',      file: 'elevator.glb'   },
        { id: 'avatar01',      file: 'NPCs/NPC_Sophie.glb' },
        { id: 'avatar02',      file: 'NPCs/NPC_Bryce.glb' },
        { id: 'avatar03',      file: 'NPCs/NPC_Jody.glb' },
        { id: 'avatar04',      file: 'NPCs/NPC_Joe.glb' },
        { id: 'avatar05',      file: 'NPCs/NPC_Josh.glb' },
        { id: 'avatar06',      file: 'NPCs/NPC_Louise.glb' },
        { id: 'avatar07',      file: 'NPCs/NPC_Martha.glb' },
        { id: 'avatar08',      file: 'NPCs/NPC_Megan.glb' },
        { id: 'mainCharacter', file: 'main_char.glb'  }
      ].forEach(({ id, file }) => {
        const item = document.createElement('a-asset-item');
        item.setAttribute('id',  id);
        item.setAttribute('src', base + file);
        assets.appendChild(item);
      });

      console.log(isLocal
        ? '[shell] Running locally — using local assets.'
        : '[shell] Running remote — using Hugging Face assets.'
      );
    })();
  </script>

  <!--
    Player rig lives in the shell, not in any sequence fragment.

    Reason: A-Frame creates a "default camera" if NO camera entity exists when
    the scene initialises. If the rig were injected later (dynamically by
    main.js), that default camera would be first in the DOM and would be
    returned by document.querySelector('[camera]') — causing body-sync to track
    the wrong camera and splitting the view from the body.

    Keeping the rig here guarantees:
      • A-Frame never creates a default camera.
      • body-sync always finds #mainCamera (the only camera in the document).
      • The mainCharacterEntity can resolve #mainCharacter from <a-assets>
        because the inline GLB loader above has already added it.
  -->
  <a-entity id="rig"
    vr-height-fix
    movement-controls="speed: 0.1;"
    rotation="0 -90 0"
    animation__pan="property: position; to: -1.165 ${currentY} 0; startEvents: panCameraIn; dur: 4500; easing: easeInOutQuad"
    animation__turn="property: rotation; to: 0 90 0; startEvents: turnCameraAround; dur: 4000; easing: easeInOutQuad">

    <!-- Camera given an explicit ID so body-sync has an unambiguous target -->
    <a-entity id="mainCamera" camera look-controls position="0 1.6 0"></a-entity>

    <a-entity id="bodyWrapper" body-sync="camera: #mainCamera" position="0 -0.82 0">
      <a-entity id="mainCharacterEntity"
        gltf-model="#mainCharacter"
        rotation="0 180 0" position="0 0 0.15" scale="1.4 1.4 1.4"
        animation-mixer="clip: Idle; loop: repeat">
      </a-entity>
    </a-entity>

    <a-entity
      oculus-touch-controls="hand: left; model: false"
      vive-controls="hand: left; model: false"
      windows-motion-controls="hand: left; model: false"
      vr-controller-input
      sequence-controller>
    </a-entity>

    <a-entity
      oculus-touch-controls="hand: right; model: false"
      vive-controls="hand: right; model: false"
      windows-motion-controls="hand: right; model: false"
      vr-controller-input
      sequence-controller>
    </a-entity>

  </a-entity>

  <a-entity id="vr-menu-container"
    vr-sequence-menu
    visible="false"
    position="-2.5 3.5 0"
    rotation="0 -90 0">
    <a-entity id="title-panel" position="0 1 -0.4">
      <a-text id="title-text"
                value="Welcome to CGH Clinical Psychology\nVR Simulation!\nPlease select a level to start with:"
                align="center" color="#FFFFFF" width="2.8" position="0 0 0.01" line-height="60"
                font="exo2semibold"></a-text>
    </a-entity>
    <a-entity id="carousel-container" position="0 0 0"></a-entity>
    <a-entity id="dropdown-container" visible="false" position="0 -0.6 0">
      <a-entity id="dropdown-panel">
        <a-text id="dropdown-text" value="Standard\nWithout NPCs\nWith All NPCs"
                  align="center" color="#FFFFFF" width="2" position="0 0 0.01" line-height="50"
                  font="exo2semibold"></a-text>
      </a-entity>
      <a-entity id="dropdown-highlight"></a-entity>
    </a-entity>
  </a-entity>

  <a-entity id="persistent-environment">
    <a-entity environment="preset: forest"></a-entity>

    <!-- ── Elevator GLB with all sound slots attached ── -->
    <a-entity id="elevatorModel"
      gltf-model="#elevator"
      position="0 1 0" rotation="0 0 0" scale="1 1 1"
      animation-mixer="clip: none"
      sound="src: #lift-move-sound; poolSize: 2; volume: 4; loop: true"
      animation__fadein="property: sound.volume; from: 0; to: 4; dur: 2000; easing: linear; startEvents: fade-in"
      animation__fadeout="property: sound.volume; from: 4; to: 0; dur: 2000; easing: linear; startEvents: fade-out"
      sound__dooropen="src: #lift-door-open;    poolSize: 2; volume: 4"
      sound__doorclose="src: #lift-door-close;  poolSize: 2; volume: 4"
      sound__ding="src: #lift-ding;             poolSize: 2; volume: 1"
      sound__voiceup="src: #voice-going-up;     poolSize: 2; volume: 1"
      sound__voicedown="src: #voice-going-down; poolSize: 2; volume: 1"
      sound__voicedoorclose="src: #voice-door-close; poolSize: 2; volume: 1">
    </a-entity>

    <!-- ── Floor displays ── -->

    <!-- Outside the lift door (facing the corridor) -->
    <a-box id="outside-screen-display"
      position="-2.042 4.124 0" width="0.631" height="0.231" depth="0.0483"
      color="#111111" rotation="0 -90 0">
      <a-triangle class="lift-arrow"
        vertex-a="0 0.08 0" vertex-b="-0.08 -0.08 0" vertex-c="0.08 -0.08 0"
        color="#FF0000" position="-0.15 0 0.0244" rotation="0 0 0"
        scale="0.9 0.9 0.9" visible="true">
      </a-triangle>
      <a-text class="lift-floor"
        value="1" color="#FF0000" align="center"
        position="0.12 0 0.02415" scale="0.9 0.9 0.9"
        font="https://cdn.aframe.io/fonts/Roboto-msdf.json">
      </a-text>
    </a-box>

    <!-- Inside the lift (facing the passenger) -->
    <a-box id="inside-screen-display"
      position="-1.482 4.124 0" width="0.631" height="0.231" depth="0.0483"
      color="#111111" rotation="0 90 0">
      <a-triangle class="lift-arrow"
        vertex-a="0 0.08 0" vertex-b="-0.08 -0.08 0" vertex-c="0.08 -0.08 0"
        color="#FF0000" position="-0.15 0 0.0244" rotation="0 0 0"
        scale="0.9 0.9 0.9" visible="true">
      </a-triangle>
      <a-text class="lift-floor"
        value="1" color="#FF0000" align="center"
        position="0.12 0 0.02415" scale="0.9 0.9 0.9"
        font="https://cdn.aframe.io/fonts/Roboto-msdf.json">
      </a-text>
    </a-box>

    <!-- ── Shaft view ── -->

    <!-- Looping scroll texture shown during transit -->
    <a-curvedimage id="scrolling-shaft"
      position="0.6 3 0" radius="7.5" theta-length="137.5" theta-start="201.25"
      height="52.5" material="src: #tex-loop; repeat: 1 4;"
      texture-scroller="speed: 0.35; direction: down"
      visible="false">
    </a-curvedimage>

    <!-- Static floor images shown when the lift is at rest -->
    <a-curvedimage id="first-floor"
      position="0.602 3 0" radius="7.5" theta-length="137.5" theta-start="201.25"
      height="10.5" material="src: #tex-first;"
      visible="true">
    </a-curvedimage>

    <a-curvedimage id="lower-floor"
      position="0.6 3.6 0" radius="7.5" theta-length="137.5" theta-start="201.25"
      height="10.5" material="src: #tex-lower;"
      visible="false">
    </a-curvedimage>

    <a-curvedimage id="middle-floor"
      position="0.6 3.6 0" radius="7.5" theta-length="137.5" theta-start="201.25"
      height="10.5" material="src: #tex-middle;"
      visible="false">
    </a-curvedimage>

    <a-curvedimage id="upper-floor"
      position="0.6 3.6 0" radius="7.5" theta-length="137.5" theta-start="201.25"
      height="10.5" material="src: #tex-upper;"
      visible="false">
    </a-curvedimage>

    <!-- ── Lift interior: safety poster ── -->
    <!-- Note: the asset id is "safety-poster-tex" (on the <img> above);
        this entity has no id of its own to avoid duplicate IDs. -->
    <a-image
      position="1.4 3.1 0" rotation="0 -90 0" width="0.8" height="1.15"
      material="src: #safety-poster-tex; transparent: true; opacity: 1">
    </a-image>

    <!-- ── Lighting ── -->
    <a-light type="ambient" intensity="0.35" color="#dfe8ff"></a-light>
    <a-light type="spot"
      position="1 4.8 0" rotation="-90 0 0"
      angle="85" penumbra="0.1" intensity="7" color="#fff5e6"
      distance="10" decay="0.1">
    </a-light>
    <a-light type="spot"
      position="0 2 -1"
      angle="45" penumbra="0.5" intensity="0.6" color="#ffffff"
      target="#liftTarget">
    </a-light>
    <a-entity id="liftTarget" position="0 1 0"></a-entity>

  </a-entity>

</a-scene>

<!-- main.js runs after the DOM is ready and injects the sequence's entities -->
<script src="js/main.js"></script>

</body>
</html>
